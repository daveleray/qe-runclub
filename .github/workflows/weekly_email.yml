name: Weekly Run Club Email

on:
  schedule:
    # Every Monday at 2 AM Eastern (7:00 UTC / shifts to 6:00 UTC during EDT)
    - cron: "0 7 * * 1"
  workflow_dispatch:
    inputs:
      week_start:
        description: "Start of week to recap (Monday, YYYY-MM-DD). Leave blank for last 7 days."
        required: false
        default: ""
      omnibus:
        description: "Set to 'true' to send a combined last-6-weeks recap instead."
        required: false
        default: "false"

jobs:
  send-recap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Send weekly recap
        env:
          WEEK_START:           ${{ github.event.inputs.week_start }}
          OMNIBUS:              ${{ github.event.inputs.omnibus }}
          STRAVA_CLIENT_ID:     ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          STRAVA_CLUB_ID:       ${{ secrets.STRAVA_CLUB_ID }}
          EMAIL_FROM:           ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:             ${{ secrets.EMAIL_TO }}
          EMAIL_APP_PASSWORD:   ${{ secrets.EMAIL_APP_PASSWORD }}
        run: python run_club_stats.py
